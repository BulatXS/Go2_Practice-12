services:
  redis:
    image: redis:7
    container_name: pr12-redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    container_name: pr12-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth:
    build:
      context: ..
      dockerfile: services/auth/Dockerfile
    container_name: pr12-auth
    command: ["/bin/auth"]
    env_file:
      - .env
    environment:
      AUTH_PORT: ${AUTH_PORT}
      AUTH_GRPC_PORT: ${AUTH_GRPC_PORT}
    ports:
      - "8081:8081"
      - "50051:50051"

  tasks_1:
    build:
      context: ..
      dockerfile: services/tasks/Dockerfile
    container_name: pr12-tasks-1
    command: ["/bin/tasks"]
    env_file:
      - .env
    environment:
      INSTANCE_ID: tasks-1
      TASKS_PORT: ${TASKS_PORT}
      AUTH_GRPC_ADDR: ${AUTH_GRPC_ADDR}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_ADDR: ${REDIS_ADDR}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS}
      CACHE_TTL_JITTER_SECONDS: ${CACHE_TTL_JITTER_SECONDS}
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
      redis:
        condition: service_started

  tasks_2:
    build:
      context: ..
      dockerfile: services/tasks/Dockerfile
    container_name: pr12-tasks-2
    command: ["/bin/tasks"]
    env_file:
      - .env
    environment:
      INSTANCE_ID: tasks-2
      TASKS_PORT: ${TASKS_PORT}
      AUTH_GRPC_ADDR: ${AUTH_GRPC_ADDR}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_ADDR: ${REDIS_ADDR}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS}
      CACHE_TTL_JITTER_SECONDS: ${CACHE_TTL_JITTER_SECONDS}
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
      redis:
        condition: service_started

  nginx:
    image: nginx:latest
    container_name: pr12-nginx
    ports:
      - "8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cert.pem:/etc/nginx/tls/cert.pem:ro
      - ./key.pem:/etc/nginx/tls/key.pem:ro
    depends_on:
      tasks_1:
        condition: service_started
      tasks_2:
        condition: service_started
      auth:
        condition: service_started

  graphql:
    build:
      context: ..
      dockerfile: services/graphql/Dockerfile
    container_name: pr12-graphql
    env_file:
      - .env
    environment:
      INSTANCE_ID: graphql
      GRAPHQL_PORT: "8090"
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy